<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <header class="header">
        <a class="maindashboard" href="index.html"> &#8592; Dashboard</a>
        <div> Task Manager</div>
    </header>

    <main class="todo-dashboard">

        <section class="card add-task">
            <h2 class="heading"> Add New Task</h2>
            <div class="groups">
                <div class="title-group">
                    <label for="task-input" class="label">Task Title</label>
                    <input type="text" id="task-input" >
                </div>
                <div class="date-group">
                    <label for="enter-date" class="label">Due Date</label>
                    <input type="date" id="enter-date">
                </div>
            </div>
            <button id="add-button">Add Task</button>
            
        </section>
        

        <section class="card task-list">
            <h2 class="heading">All Task</h2>
            <div class="tasks">

            </div>
        </section>
    </main>

    <script src="todo.js"></script>
</body>
</html>
