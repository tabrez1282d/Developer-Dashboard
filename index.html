<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="logo"> FocusFlow</h1>
        <div class="toggle">Coming Later</div>
    </header>
    <main>
        <div class="top-card">
            <div class="card" id="clock"></div>
            <div class="card">Date Card</div>
        </div>

        <div class="card greeting-card">
            <p id="greet-time"></p>
            <p class="greet-p">"Hope you have a productive day." </p>
        </div>
        <div class="card quote-card">Quote </div>

        <div class="dashboard-grid">
            <div class="card">Todo Card</div>
            <div class="card">Weather Card</div>
            <div class="card">Notes Card</div>
            <div class="card">Pomodoro Card</div>
        </div>


    </main>
    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
